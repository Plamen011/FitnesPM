<section id="contact" style="
    padding: 100px 5%; 
    color: white; 
    font-family: 'Segoe UI', sans-serif;
    position: relative; 
    background-image: url('услуги.jpg'); /* Увери се, че файлът е в същата папка */

   min-height: 100vh;

">
<style>
    /* Адаптивност за мобилни устройства (вертикално и хоризонтално) */
  @media (max-width: 768px) {
        #contact {
            padding: 0 !important; /* Премахва рамката от основната секция */
            margin: 0 !important;
            display: block !important; /* Позволява нормално скролване */
        }

        /* Премахваме фиксирания слой за центриране, който пречи на скрола */
        #contact > div[style*="position: absolute"] {
            display: none !important;
        }

        /* КУТИЯТА СЪС СЪДЪРЖАНИЕТО - ЗАПЪЛВА 100% */
        #contact > div[style*="position: relative"] {
            width: 100% !important;
            max-width: 100vw !important; /* Разпъва до крайните ръбове на телефона */
            margin: 0 !important;
            padding: 50px 20px !important; /* Вътрешно разстояние, за да не опира текстът в стъклото */
            border-radius: 0 !important; /* Премахва заоблянето, за да прилепне плътно */
            border: none !important; /* Маха червената рамка за по-изчистен вид на цял екран */
            min-height: 100vh !important; /* Заема цялата височина на екрана */
            display: flex !important;
            flex-direction: column !important;
            justify-content: flex-start !important;
            background: rgba(20, 20, 20, 0.98) !important; /* Почти плътен фон */
        }

        /* Подреждане на информацията една под друга */
        #contact > div[style*="display: grid"] {
            display: flex !important;
            flex-direction: column !important;
            gap: 40px !important;
        }

        /* Оптимизация на текстовете и бутоните */
        #contact h2 {
            font-size: 2.2rem !important;
            text-align: center !important;
        }
        
        #contact p {
            text-align: center !important;
            font-size: 1.1rem !important;
        }

        input, textarea, button {
            width: 100% !important;
            font-size: 16px !important; /* Важно за предотвратяване на зуум в iPhone */
            padding: 18px !important; /* По-големи полета за по-лесно натискане */
        }

        /* Оптимизация специално за хоризонтален режим */
        @media (orientation: landscape) {
            #contact {
                padding-top: 20px !important;
            }
        }
    }
</style>
